<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    Expedition pin glyphs.

    Conventions for every symbol:
      - viewBox 0 0 24 24, drawn to occupy ~14x14 inside (1px padding)
      - fill="currentColor" so MapLibre recolors via icon-color
      - no stroke (stroke is unreliable at small sizes)
      - no background (the white ring + colored pin already provide bg)
  -->

  <symbol id="pin-marker" viewBox="0 0 24 24">
    <!-- Solid drop pin — default for any "this is a place" data. -->
    <path fill="currentColor" d="M12 2c-4.4 0-8 3.4-8 7.6 0 5.5 7.2 11.6 7.5 11.9.3.3.7.3 1 0 .3-.3 7.5-6.4 7.5-11.9C20 5.4 16.4 2 12 2zm0 10.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
  </symbol>

  <symbol id="pin-dot" viewBox="0 0 24 24">
    <!-- Solid dot — "this thing, no further meaning". -->
    <circle cx="12" cy="12" r="5" fill="currentColor"/>
  </symbol>

  <symbol id="pin-star" viewBox="0 0 24 24">
    <!-- Star — promoted / important. -->
    <path fill="currentColor" d="M12 2.6l2.85 5.77 6.37.93-4.61 4.49 1.09 6.34L12 17.1l-5.7 2.99 1.09-6.34-4.61-4.49 6.37-.93L12 2.6z"/>
  </symbol>

  <symbol id="pin-square" viewBox="0 0 24 24">
    <!-- Rounded square — generic "asset". -->
    <rect x="4" y="4" width="16" height="16" rx="3" fill="currentColor"/>
  </symbol>

  <symbol id="pin-diamond" viewBox="0 0 24 24">
    <!-- Diamond — distinguished / high-status. -->
    <path fill="currentColor" d="M12 2.5L21.5 12 12 21.5 2.5 12 12 2.5z"/>
  </symbol>

  <symbol id="pin-triangle" viewBox="0 0 24 24">
    <!-- Triangle — warning / attention. -->
    <path fill="currentColor" d="M12 3.5L22 20H2L12 3.5z"/>
  </symbol>

  <symbol id="pin-flag" viewBox="0 0 24 24">
    <!-- Flag — pinned location / status. -->
    <path fill="currentColor" d="M5 3v18h2v-7h11l-2-4 2-4H7V3H5z"/>
  </symbol>

  <symbol id="pin-crosshair" viewBox="0 0 24 24">
    <!-- Crosshair — precise / survey-grade. -->
    <path fill="currentColor" d="M11 2h2v4h-2zM11 18h2v4h-2zM2 11h4v2H2zM18 11h4v2h-4z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" d="M12 6a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 2.4a3.6 3.6 0 1 1 0 7.2 3.6 3.6 0 0 1 0-7.2z"/>
  </symbol>

  <symbol id="pin-building" viewBox="0 0 24 24">
    <!-- Building — office / HQ / facility. -->
    <path fill="currentColor" d="M4 21V5l8-3 8 3v16h-5v-5h-6v5H4zm6-9h2v-2h-2v2zm0 4h2v-2h-2v2zm4-4h2v-2h-2v2zm0 4h2v-2h-2v2z"/>
  </symbol>

  <symbol id="pin-home" viewBox="0 0 24 24">
    <!-- Home — residence / household. -->
    <path fill="currentColor" d="M12 2.7L2 11h2.5v10H10v-6h4v6h5.5V11H22L12 2.7z"/>
  </symbol>

  <symbol id="pin-cart" viewBox="0 0 24 24">
    <!-- Cart — sales / retail. -->
    <path fill="currentColor" d="M3 4h3l1.7 11.3a2 2 0 0 0 2 1.7h8.6a2 2 0 0 0 2-1.6L22 8H7m1.5 13a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm9 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
  </symbol>

  <symbol id="pin-truck" viewBox="0 0 24 24">
    <!-- Truck — distribution / logistics. -->
    <path fill="currentColor" d="M2 5h12v9h2v-4h3l3 4v4h-3a2 2 0 1 1-4 0h-2a2 2 0 1 1-4 0H2V5zm14 11.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-9 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
  </symbol>

  <symbol id="pin-warn" viewBox="0 0 24 24">
    <!-- Warning — alert / SLA breach. -->
    <path fill="currentColor" d="M12 2.5L22 21H2L12 2.5zm-1 7v6h2v-6h-2zm0 7v2h2v-2h-2z"/>
  </symbol>

  <symbol id="pin-check" viewBox="0 0 24 24">
    <!-- Check — verified / complete. -->
    <path fill="currentColor" d="M9.5 17.4L4 11.9l1.8-1.8 3.7 3.7 8.7-8.7L20 7z"/>
  </symbol>

  <symbol id="pin-x" viewBox="0 0 24 24">
    <!-- X — closed / cancelled. -->
    <path fill="currentColor" d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4l-6.3 6.3-1.4-1.4L9.2 12 2.9 5.7l1.4-1.4L10.6 10.6l6.3-6.3z"/>
  </symbol>

  <symbol id="pin-dollar" viewBox="0 0 24 24">
    <!-- Dollar — revenue / pricing. -->
    <path fill="currentColor" d="M11 3h2v2.2c2.4.4 4 2 4 4.3h-2.2c0-1.4-1.3-2.4-2.8-2.4-1.6 0-2.8.9-2.8 2.1 0 1.2 1 1.7 3 2.2 2.8.7 5 1.6 5 4.4 0 2.4-1.8 3.9-4.2 4.3V21h-2v-2c-2.6-.3-4.4-1.9-4.4-4.3h2.2c0 1.5 1.2 2.4 3 2.4 1.7 0 3-.8 3-2.1 0-1.3-1.1-1.8-3.2-2.3C7 12 5 11 5 8.4 5 6.2 6.6 4.7 9 4.3V3h2z"/>
  </symbol>
</svg>
