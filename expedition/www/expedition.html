{# Expedition — full-bleed canvas. No Frappe Desk chrome, no global web CSS. #}
{% extends "templates/base.html" %}

{% block head %}
	<link rel="stylesheet" href="/assets/expedition/dist/expedition.css?v={{ expedition_build }}" />
	<script>
		// Mount CSRF + build hash + session user before the bundle boots.
		window.expedition = window.expedition || {};
		window.expedition.csrfToken = {{ csrf_token | tojson }};
		window.expedition.build = {{ expedition_build | tojson }};
		window.expeditionSession = { user: {{ expedition_user | tojson }} };
	</script>
{% endblock %}

{% block body %}
	<div id="expedition-root"></div>
	<script src="/assets/expedition/dist/expedition.iife.js?v={{ expedition_build }}"></script>
{% endblock %}
